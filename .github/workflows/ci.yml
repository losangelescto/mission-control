name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - staging
      - production

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Stage 1: lint + typecheck ────────────────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/pyproject.toml

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Lint API with ruff
        run: ruff check apps/api/app

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        working-directory: apps/web
        run: pnpm exec tsc --noEmit

  # ─── Stage 2: tests ───────────────────────────────────────
  test:
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mission_control_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/mission_control_test
      APP_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install API dependencies
        working-directory: apps/api
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run API tests
        working-directory: apps/api
        run: |
          if [ -d tests ] && compgen -G "tests/test_*.py" > /dev/null; then
            pytest -q
          else
            echo "No API tests found — skipping"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        working-directory: apps/web
        run: |
          if grep -q '"test"' package.json; then
            pnpm test
          else
            echo "No web tests found — skipping"
          fi

  # ─── Stage 3: Docker build verification ───────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: false
          load: false
          tags: mission-control-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: false
          load: false
          tags: mission-control-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
