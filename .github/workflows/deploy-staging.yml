name: Deploy Staging

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  API_IMAGE: mission-control-api
  WEB_IMAGE: mission-control-web
  API_APP_NAME: mc-api-staging
  WEB_APP_NAME: mc-web-staging

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_tag: ${{ steps.tags.outputs.api_tag }}
      web_tag: ${{ steps.tags.outputs.web_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "api_tag=staging-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "web_tag=staging-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ steps.tags.outputs.api_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:staging
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:${{ steps.tags.outputs.web_tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:staging
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update API container app
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ env.API_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.API_IMAGE }}:${{ needs.build-and-push.outputs.api_tag }} \
              --output none

      - name: Update Web container app
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ env.WEB_APP_NAME }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.WEB_IMAGE }}:${{ needs.build-and-push.outputs.web_tag }} \
              --output none

      - name: Wait for revisions to be ready
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            for app in ${{ env.API_APP_NAME }} ${{ env.WEB_APP_NAME }}; do
              for attempt in $(seq 1 30); do
                state=$(az containerapp revision list \
                  --name "$app" \
                  --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
                  --query "[?properties.active].properties.runningState | [0]" -o tsv)
                echo "$app revision state: $state (attempt $attempt)"
                if [ "$state" = "Running" ] || [ "$state" = "RunningAtMaxScale" ]; then
                  break
                fi
                sleep 10
              done
            done

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check API /health
        run: |
          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 10 "${{ secrets.STAGING_API_URL }}/health"; then
              echo ""
              echo "API health check passed"
              exit 0
            fi
            echo "API not ready, retry $attempt/12"
            sleep 10
          done
          echo "API health check failed after 12 attempts"
          exit 1

      - name: Check Web /
        run: |
          for attempt in $(seq 1 12); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.STAGING_WEB_URL }}/")
            if [ "$code" = "200" ] || [ "$code" = "307" ]; then
              echo "Web health check passed (HTTP $code)"
              exit 0
            fi
            echo "Web returned HTTP $code, retry $attempt/12"
            sleep 10
          done
          echo "Web health check failed"
          exit 1
